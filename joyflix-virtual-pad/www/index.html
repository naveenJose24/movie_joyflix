<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JoyFlix Remote</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <div id="setup-screen" class="screen active">
    <div class="logo">
      <i class="ph-fill ph-film-strip"></i>
      Joy<span>Flix</span>
    </div>
    <h2>Connect to TV</h2>
    <p>Enter the 4-digit code shown on your TV.</p>
    <div class="code-inputs">
      <input type="tel" id="digit1" maxlength="1" autocomplete="off" />
      <input type="tel" id="digit2" maxlength="1" autocomplete="off" />
      <input type="tel" id="digit3" maxlength="1" autocomplete="off" />
      <input type="tel" id="digit4" maxlength="1" autocomplete="off" />
    </div>
    <button id="connectBtn" class="btn primary">Connect</button>
    <p id="statusMsg" class="status-msg"></p>
  </div>

  <div id="remote-screen" class="screen">
    <div class="top-bar">
      <div class="connected-status">
        <div class="dot"></div> Connected
      </div>
      <button id="disconnectBtn" class="btn small"><i class="ph ph-plugs"></i> Disconnect</button>
    </div>

    <!-- D-pad -->
    <div class="dpad-container">
      <div class="dpad">
        <button class="dpad-btn up" data-key="ArrowUp"><i class="ph-fill ph-caret-up"></i></button>
        <button class="dpad-btn left" data-key="ArrowLeft"><i class="ph-fill ph-caret-left"></i></button>
        <button class="dpad-btn ok" data-key="Enter">OK</button>
        <button class="dpad-btn right" data-key="ArrowRight"><i class="ph-fill ph-caret-right"></i></button>
        <button class="dpad-btn down" data-key="ArrowDown"><i class="ph-fill ph-caret-down"></i></button>
      </div>
    </div>

    <!-- Extra controls -->
    <div class="extra-controls">
      <button class="action-btn back" data-key="Escape">
        <i class="ph ph-arrow-u-down-left"></i>
        <span>Back</span>
      </button>
      <button class="action-btn mic-btn" id="micBtn">
        <i class="ph ph-microphone"></i>
        <span>Speak</span>
      </button>
      <button class="action-btn home" data-key="Home">
        <i class="ph ph-house"></i>
        <span>Home</span>
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
